<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sandloop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0f1520;
    color: #c8c8d0;
    font-family: 'Fredoka', sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    background: #0f1520;
    max-width: 100vw;
    max-height: 100vh;
    height: auto;
    width: auto;
  }
</style>
</head>
<body>

<canvas id="game" width="540" height="960"></canvas>

<!-- Script load order matters. See GAME.md for the rules. -->
<script src="js/config.js"></script>
<script src="js/registry.js"></script>
<script src="js/palette.js"></script>

<!-- Systems. -->
<script src="js/sandfield.js"></script>
<script src="js/conveyor.js"></script>
<script src="js/bucket_grid.js"></script>

<!-- Entity types: register themselves on load. -->
<script src="js/entity_bucket.js"></script>
<script src="js/entity_sandstream.js"></script>

<!-- Debug UI (DOM overlay, must come before game.js so it can load storage). -->
<script src="js/debug_panel.js"></script>

<!-- Game loop last. -->
<script src="js/game.js"></script>

</body>
</html>
