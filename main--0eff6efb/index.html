<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UniversalPhaty — Game Starter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #14141a;
    color: #c8c8d0;
    font-family: 'Fredoka', sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  canvas {
    display: block;
    background: #1f1f24;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    max-width: 95vw;
    max-height: 80vh;
  }
  .hint {
    font-size: 14px;
    color: #8a8a94;
    text-align: center;
    padding: 0 16px;
    line-height: 1.5;
  }
  .hint code {
    background: rgba(255, 255, 255, 0.08);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
</style>
</head>
<body>

<canvas id="game" width="720" height="480"></canvas>
<div class="hint">
  UniversalPhaty starter. See <code>GAME.md</code> and <code>PLATFORM.md</code> to start building.
</div>

<!-- Script load order matters. See GAME.md for the rules. -->
<script src="js/config.js"></script>
<script src="js/registry.js"></script>

<!-- Entity types: register themselves on load. Add new ones here. -->
<script src="js/entity_demo.js"></script>

<!-- Game loop last. -->
<script src="js/game.js"></script>

</body>
</html>
